name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  # CI: Continuous Integration (Testes)
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm" # cache do node_modules

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci # mais seguro que npm install em CI

      - run: npx playwright install --with-deps

      - run: npm run test:coverage # Jest com coverage

      - run: npm run test:e2e # Playwright (webServer cuida do start)

      - name: Upload relatório de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

      - name: Upload relatório Playwright
        uses: actions/upload-artifact@v4
        if: always() # publica mesmo se os testes falharem
        with:
          name: playwright-report
          path: reports/playwright/

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Simulando deploy..."
          echo "Aqui você colocaria seus comandos reais de deploy"
